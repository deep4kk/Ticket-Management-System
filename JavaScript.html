<script>
let currentUser=null,currentLang="en";
const T={en:{dashboard:"Dashboard",submit:"Submit",success:"Success!",error:"Error",noData:"No data",export:"Export",pdf:"PDF"},es:{dashboard:"Panel",submit:"Enviar",success:"Exito!",error:"Error",noData:"Sin datos",export:"Exportar",pdf:"PDF"}};
const t=k=>T[currentLang]?.[k]||T.en[k]||k;
document.addEventListener("DOMContentLoaded",async()=>{currentLang=localStorage.getItem("appLang")||"en";document.querySelector(".lang-select")&&(document.querySelector(".lang-select").value=currentLang);await loadUserInfo();await loadDashboard();setupNavigation();applyTheme();initCharts()});
async function loadUserInfo(){try{currentUser=await run(getCurrentUser);const un=document.getElementById("userName"),ua=document.getElementById("userAvatar"),ur=document.getElementById("userRole");un&&(un.textContent=currentUser.name||currentUser.email);ua&&(ua.textContent=(currentUser.name||"U").charAt(0).toUpperCase());ur&&(ur.textContent=currentUser.role||"User")}catch(e){}}
function setupNavigation(){document.querySelectorAll(".nav-item").forEach(b=>{b.addEventListener("click",()=>{if(b.dataset.view)switchView(b.dataset.view)})})}
function switchView(v){document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.view===v));document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.id===v+"View"));const pt=document.getElementById("pageTitle");pt&&(pt.textContent=t(v)||"Dashboard");loadViewData(v)}
async function loadViewData(v){try{const d=await run(getRecordsForView,v);const c=document.getElementById(v+"List");c&&(c.innerHTML=d&&d.length?d.map(r=>`<div class="record-card"><div class="record-title">${r.name||r.title||"Item"}</div><div class="record-meta">${r.status||""}</div></div>`).join(""):`<p class="no-data">${t("noData")}</p>`)}catch(e){}}
async function loadDashboard(){try{const stats=await run(getDashboardStats);renderStats(stats);drawCharts(stats);const r=await run(getRecentRecords);const rc=document.getElementById("recentRecords");rc&&(rc.innerHTML=r&&r.length?r.map(x=>`<div class="record-card"><div class="record-title">${x.name||x.title||"Item"}</div></div>`).join(""):`<p class="no-data">${t("noData")}</p>`)}catch(e){}}
function renderStats(stats){const s=document.getElementById("statsRow");if(!s)return;s.innerHTML=Object.entries(stats).map(([k,v])=>`<div class="stat-card"><div class="stat-value">${v}</div><div class="stat-label">${k}</div></div>`).join("")}
function drawCharts(stats){if(typeof google==="undefined"||!stats)return;const d=stats.chartData||{labels:["Pending","Approved"],values:[5,10]};try{const el=document.getElementById("donutChart");el&&new google.visualization.PieChart(el).draw(google.visualization.arrayToDataTable([["Status","Count"],...d.labels.map((l,i)=>[l,d.values[i]||0])]),{pieHole:0.5,colors:["#F59E0B","#10B981"],legend:"bottom"})}catch(e){}try{const el=document.getElementById("lineChart");el&&new google.visualization.LineChart(el).draw(google.visualization.arrayToDataTable([["Month","Count"],...d.labels.map((l,i)=>[l,d.values[i]||0])]),{colors:["#667EEA"],legend:"none",pointSize:5})}catch(e){}}
function initCharts(){if(typeof google!=="undefined"){google.charts.load("current",{packages:["corechart"]});google.charts.setOnLoadCallback(()=>run(getDashboardStats).then(drawCharts).catch(()=>{}))}}
function changeLanguage(l){currentLang=l;localStorage.setItem("appLang",l);location.reload()}
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute("data-theme")==="dark";h.setAttribute("data-theme",d?"light":"dark");document.querySelector(".btn-icon")&&(document.querySelector(".btn-icon").textContent=d?"🌙":"☀️");localStorage.setItem("theme",d?"light":"dark");typeof google!=="undefined"&&drawCharts&&run(getDashboardStats).then(drawCharts).catch(()=>{})}
function applyTheme(){const th=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",th);const bi=document.querySelector(".btn-icon");bi&&(bi.textContent=th==="dark"?"☀️":"🌙")}
const run=fn=>new Promise((r,e)=>google.script.run.withSuccessHandler(r).withFailureHandler(e)[fn.name]());
function formatDate(d){return d?new Date(d).toLocaleDateString():""}
function formatDateTime(d){return d?new Date(d).toLocaleString():""}
function showToast(m,type="info"){const c=document.getElementById("toastContainer")||document.body.appendChild(Object.assign(document.createElement("div"),{id:"toastContainer"}));const x=Object.assign(document.createElement("div"),{className:"toast "+type,textContent:m});c.appendChild(x);setTimeout(()=>{x.style.opacity="0";setTimeout(()=>x.remove(),300)},3000)}
async function exportExcel(){try{window.open((await run(exportToExcelFile)).url);showToast(t("success"),"success")}catch(e){showToast(t("error"),"error")}}
async function exportCSV(){try{showToast((await run(exportToCSVFile)).fileName,"success")}catch(e){showToast(t("error"),"error")}}
async function generatePDF(){try{showToast((await run(generatePDFReport,"Report",{headers:[],rows:[]})).fileName,"success")}catch(e){showToast(t("error"),"error")}}
</script>
