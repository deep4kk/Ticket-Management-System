<script>
let currentUser=null,tickets=[];
document.addEventListener('DOMContentLoaded',async()=>{await loadUserInfo();await loadDashboard();setupListeners()});
async function loadUserInfo(){try{currentUser=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getCurrentUser()});document.getElementById('userName').textContent=currentUser.name||currentUser.email;document.getElementById('userRole').textContent=currentUser.role||'Agent';document.getElementById('userAvatar').textContent=(currentUser.name||'U').charAt(0).toUpperCase()}catch(e){}}
function setupListeners(){document.querySelectorAll('.nav-item').forEach(b=>{b.addEventListener('click',()=>{if(b.dataset.view)switchView(b.dataset.view)})});document.getElementById('ticketForm').addEventListener('submit',handleCreateTicket)}
function switchView(view){document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===view+'View'));document.getElementById('pageTitle').textContent={dashboard:'Dashboard',tickets:'All Tickets','new-ticket':'New Ticket'}[view]||'Dashboard';if(view==='tickets')renderTickets()}
async function loadDashboard(){try{const data=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getDashboardData()});document.getElementById('statTotal').textContent=data.total;document.getElementById('statOpen').textContent=data.open;document.getElementById('statOverdue').textContent=data.overdue;renderTicketsPreview(data.recent)}catch(e){}}
function renderTicketsPreview(tList){const container=document.getElementById('ticketsPreview');if(!tList.length){container.innerHTML='<p style="text-align:center;color:var(--gray-500);padding:40px">No tickets yet</p>';return}container.innerHTML='<h3>Recent Tickets</h3>'+tList.map(t=>`<div class="ticket-card ${t.priority.toLowerCase()}"><div class="ticket-header"><div><div class="ticket-id">${t.ticketID}</div><div class="ticket-subject">${t.subject}</div><div class="ticket-meta">${t.customerName} · ${t.category} · ${new Date(t.createdAt).toLocaleDateString()}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="priority-badge ${t.priority.toLowerCase()}">${t.priority}</span><span class="status-badge ${t.status.toLowerCase().replace(' ','-')}">${t.status}</span></div></div></div>`).join('')}
async function renderTickets(){try{tickets=await new Promise((r,e)=>{google.script.run.withSuccessHandler(r).withFailureHandler(e).getAllTickets()});document.getElementById('ticketsList').innerHTML=tickets.length?tickets.map(t=>`<div class="ticket-card ${t.priority.toLowerCase()}"><div class="ticket-header"><div><div class="ticket-id">${t.ticketID}</div><div class="ticket-subject">${t.subject}</div><div class="ticket-meta">${t.customerName} · ${t.category} · ${new Date(t.createdAt).toLocaleDateString()}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="priority-badge ${t.priority.toLowerCase()}">${t.priority}</span><span class="status-badge ${t.status.toLowerCase().replace(' ','-')}">${t.status}</span></div></div></div>`).join(''):'<p style="text-align:center;color:var(--gray-500);padding:40px">No tickets yet</p>'}catch(e){showToast('Failed to load tickets','error')}}
async function handleCreateTicket(e){e.preventDefault();try{const result=await new Promise((r,rej)=>{google.script.run.withSuccessHandler(r).withFailureHandler(rej).createTicket(document.getElementById('ticketSubject').value,document.getElementById('ticketDescription').value,document.getElementById('customerEmail').value,document.getElementById('customerName').value)});showToast(`Ticket created! (${result.ticketID}) - Category: ${result.category} - Priority: ${result.priority}`,'success');document.getElementById('ticketForm').reset();switchView('tickets');loadDashboard()}catch(err){showToast(err.message||'Failed to create ticket','error')}}
function showToast(m,t='success'){const c=document.getElementById('toastContainer');const toast=document.createElement('div');toast.className=`toast ${t}`;toast.innerHTML=`<span>${m}</span>`;c.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},3000)}
</script>
